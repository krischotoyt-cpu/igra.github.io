<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>За Ели 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--pink:#ff6f91;
--glass:rgba(255,255,255,.08);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Inter',sans-serif;
background:#08090d;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
}

/* cinematic background */

body::before{
content:"";
position:fixed;
width:140%;
height:140%;
background:
radial-gradient(circle at 20% 30%,#ff8fb1,transparent),
radial-gradient(circle at 80% 60%,#ffc2d1,transparent),
radial-gradient(circle at 50% 90%,#ffccd5,transparent);
filter:blur(140px);
opacity:.55;
}

/* canvas */

canvas{
position:fixed;
top:0;
left:0;
}

/* card */

.card{
width:min(92vw,420px);
padding:34px;
border-radius:22px;
background:var(--glass);
backdrop-filter:blur(24px);
box-shadow:
0 30px 60px rgba(0,0,0,.45),
inset 0 0 40px rgba(255,255,255,.05);
text-align:center;
}

/* title */

h1{
font-family:'Playfair Display',serif;
font-size:32px;
margin-bottom:8px;
}

/* subtitle */

.subtitle{
opacity:.85;
margin-bottom:22px;
font-size:15px;
}

/* button */

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:500;
background:white;
color:var(--pink);
cursor:pointer;
transition:.25s;
}

button:active{
transform:scale(.95);
}

/* letter */

#letter{
margin-top:24px;
font-size:18px;
line-height:1.65;
min-height:100px;
}

/* typing cursor */

.cursor{
display:inline-block;
width:2px;
height:18px;
background:white;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="card">

<h1>Честит 8 март, любовче!</h1>

<p class="subtitle">
Имам нещо специално за теб
</p>

<button onclick="start()">
Отвори изненадата
</button>

<div id="letter"></div>

</div>

<script>

/* TYPEWRITER */

const message = `Прекрасна моя,

С теб всичко е по-забавно и цветно.
Красотата ти ме кара да се усмихвам без причина,
а само да те зърна прави деня ми 100 пъти по-хубав.

Благодаря ти, котенце.

Обичам те ❤️`;

let i = 0;

function start(){
typeWriter();
}

function typeWriter(){

const el=document.getElementById("letter");

if(i < message.length){

el.innerHTML = message.substring(0,i) + '<span class="cursor"></span>';

i++;

setTimeout(typeWriter,35);

}else{

el.innerHTML = message;

}

}

/* CANVAS SYSTEM */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

/* FLOWERS */

class Flower{

constructor(){

this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;

this.petals=6;

this.radius=0;
this.maxRadius=15+Math.random()*20;

this.growSpeed=.15+Math.random()*.25;

this.rotation=Math.random()*Math.PI;

}

update(){

if(this.radius < this.maxRadius){
this.radius+=this.growSpeed;
}

this.draw();

}

draw(){

ctx.save();

ctx.translate(this.x,this.y);
ctx.rotate(this.rotation);

for(let i=0;i<this.petals;i++){

ctx.rotate(Math.PI*2/this.petals);

ctx.beginPath();

ctx.ellipse(
0,
this.radius/2,
this.radius/3,
this.radius,
0,
0,
Math.PI*2
);

ctx.fillStyle="rgba(255,170,190,0.9)";
ctx.fill();

}

ctx.beginPath();
ctx.arc(0,0,this.radius/4,0,Math.PI*2);

ctx.fillStyle="#ffd166";
ctx.fill();

ctx.restore();

}

}

/* PETALS */

class Petal{

constructor(){

this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;

this.size=5+Math.random()*5;

this.speedY=.4+Math.random()*.5;
this.speedX=Math.random()*.4-.2;

this.rotation=Math.random()*Math.PI;
this.rotationSpeed=Math.random()*.02-.01;

}

update(){

this.y+=this.speedY;
this.x+=this.speedX;

this.rotation+=this.rotationSpeed;

if(this.y > canvas.height){
this.y = -10;
this.x = Math.random()*canvas.width;
}

}

draw(){

ctx.save();

ctx.translate(this.x,this.y);
ctx.rotate(this.rotation);

ctx.beginPath();
ctx.ellipse(0,0,this.size,this.size*.6,0,0,Math.PI*2);

ctx.fillStyle="rgba(255,180,200,.9)";
ctx.fill();

ctx.restore();

}

}

/* POLLEN */

class Particle{

constructor(){

this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;

this.size=Math.random()*1.8;

this.speedX=Math.random()*.3-.15;
this.speedY=Math.random()*.3-.15;

}

update(){

this.x+=this.speedX;
this.y+=this.speedY;

if(this.x>canvas.width) this.x=0;
if(this.x<0) this.x=canvas.width;

if(this.y>canvas.height) this.y=0;
if(this.y<0) this.y=canvas.height;

}

draw(){

ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

ctx.fillStyle="rgba(255,255,255,.7)";
ctx.fill();

}

}

let flowers=[];
let petals=[];
let particles=[];

for(let i=0;i<16;i++) flowers.push(new Flower());
for(let i=0;i<35;i++) petals.push(new Petal());
for(let i=0;i<60;i++) particles.push(new Particle());

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.update();
p.draw();
});

flowers.forEach(f=>f.update());

petals.forEach(p=>{
p.update();
p.draw();
});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
